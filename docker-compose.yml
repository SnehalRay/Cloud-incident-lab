services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL — primary database
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: incident-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - incident-lab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # Redis — cache layer
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: incident-lab-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - incident-lab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ──────────────────────────────────────────────────────────
  # Backend — Spring Boot API
  # Build path adjusted: project lives in backend-app/backend-spring/
  # ──────────────────────────────────────────────────────────
  backend:
    build: ./services/backend-app/backend-spring
    container_name: incident-lab-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_URL:        ${DB_URL}
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}
      REDIS_HOST:    ${REDIS_HOST}
      REDIS_PORT:    ${REDIS_PORT}
    networks:
      - incident-lab-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # Frontend — React app served via nginx
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend-app/template
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: incident-lab-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - incident-lab-network
    depends_on:
      - backend

# ──────────────────────────────────────────────────────────
# Named volumes — data persists across container restarts
# ──────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:

# ──────────────────────────────────────────────────────────
# Network — all services share one internal network
# ──────────────────────────────────────────────────────────
networks:
  incident-lab-network:
    driver: bridge
