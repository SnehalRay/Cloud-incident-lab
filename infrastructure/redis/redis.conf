# ─────────────────────────────────────────────────────────────
# Cloud Incident Lab — Redis Configuration
# ─────────────────────────────────────────────────────────────

# Allow connections from any interface inside Docker network
bind 0.0.0.0

# Default port
port 6379

# Memory cap — prevents Redis from consuming unbounded host memory
maxmemory 256mb

# Eviction policy: remove least-recently-used keys when maxmemory is hit
# This is realistic for a cache-only Redis instance
maxmemory-policy allkeys-lru

# Persist data to disk so the volume survives container restarts
# RDB snapshot: save if at least 1 key changed in the last 900s, 10 keys in 300s, 10000 keys in 60s
save 900 1
save 300 10
save 60 10000

# RDB file location (mapped to Docker volume)
dir /data
dbfilename dump.rdb

# Log level: notice is verbose enough to catch connection events without noise
loglevel notice

# Disable protected-mode so the container health check (redis-cli ping) works without auth
protected-mode no
